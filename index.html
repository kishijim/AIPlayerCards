<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apex Player TCG Generator</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-gray-100 min-h-screen flex items-center justify-center p-4 font-sans">

    <div class="bg-gray-800 rounded-2xl shadow-2xl overflow-hidden max-w-4xl w-full flex flex-col md:flex-row">
        
        <!-- 左側：設定パネル -->
        <div class="p-6 md:w-1/2 flex flex-col gap-4 border-r border-gray-700">
            <h1 class="text-2xl font-bold text-transparent bg-clip-text bg-gradient-to-r from-red-500 to-orange-400">
                Player TCG Generator
            </h1>
            <p class="text-xs text-gray-400">AIを使用してオリジナルのSFキャラクターカードを生成します。</p>

            <div class="space-y-4 mt-4">
                <div>
                    <label class="block text-sm font-medium text-gray-300 mb-1">Google API Key</label>
                    <input type="password" id="apiKeyInput" placeholder="AI StudioのAPIキーを入力" class="w-full bg-gray-700 text-white rounded-lg px-3 py-2 border border-gray-600 focus:border-red-500 focus:outline-none">
                    <p class="text-[10px] text-gray-400 mt-1">※キーは保存されません</p>
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-300 mb-1">キャラクターのベース (モチーフ)</label>
                    <select id="legendSelect" class="w-full bg-gray-700 text-white rounded-lg px-3 py-2 border border-gray-600 focus:border-red-500 focus:outline-none">
                        <option value="A swift dimensional ninja, glowing trails">スピード＆次元移動忍者風</option>
                        <option value="A heavy armored toxic trapper, gas mask">重装甲＆毒ガスマスク風</option>
                        <option value="A futuristic robotic scout, glowing eye">未来のロボットスカウト風</option>
                        <option value="A medic with holographic angel wings">ホログラムの羽を持つ衛生兵風</option>
                    </select>
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-300 mb-1">装備の雰囲気 (NGワード回避)</label>
                    <select id="weaponSelect" class="w-full bg-gray-700 text-white rounded-lg px-3 py-2 border border-gray-600 focus:border-red-500 focus:outline-none">
                        <option value="holding a futuristic sci-fi gadget">未来的なSFガジェットを装備</option>
                        <option value="equipped with a high-tech energy tool">ハイテクエネルギー装置を装備</option>
                        <option value="carrying heavy survival gear">重厚なサバイバルギアを装備</option>
                    </select>
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-300 mb-1">背景のマップ環境</label>
                    <select id="mapSelect" class="w-full bg-gray-700 text-white rounded-lg px-3 py-2 border border-gray-600 focus:border-red-500 focus:outline-none">
                        <option value="Cyberpunk city slums, neon lights">サイバーパンク都市のスラム、ネオン</option>
                        <option value="Deserted alien canyon, glowing crystals">荒涼としたエイリアンの渓谷</option>
                        <option value="High-tech floating facility, bright sky">空飛ぶハイテク施設</option>
                    </select>
                </div>
            </div>

            <button id="generateBtn" class="mt-auto w-full bg-gradient-to-r from-red-600 to-red-700 hover:from-red-500 hover:to-red-600 text-white font-bold py-3 px-4 rounded-lg transition-all flex justify-center items-center gap-2">
                <span>画像を生成する</span>
                <svg id="loader" class="animate-spin h-5 w-5 text-white hidden" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>
            </button>
        </div>

        <!-- 右側：画像プレビュー -->
        <div class="md:w-1/2 p-6 flex flex-col items-center justify-center bg-gray-900 relative">
            <div id="cardContainer" class="w-64 h-96 bg-gray-800 rounded-xl border-4 border-gray-700 shadow-[0_0_15px_rgba(0,0,0,0.5)] overflow-hidden relative flex flex-col items-center justify-center text-center p-4">
                
                <div id="imageArea" class="absolute inset-0 bg-cover bg-center opacity-80 transition-opacity duration-500"></div>
                
                <div id="placeholderText" class="z-10 w-full">
                    <div class="w-16 h-16 mx-auto mb-4 text-gray-600">
                        <svg fill="currentColor" viewBox="0 0 24 24"><path d="M21 19V5c0-1.1-.9-2-2-2H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2zM8.5 13.5l2.5 3.01L14.5 12l4.5 6H5l3.5-4.5z"/></svg>
                    </div>
                    <p class="text-gray-500 font-medium">画像がここに表示されます</p>
                </div>

                <!-- エラー表示用パネル -->
                <div id="errorPanel" class="hidden absolute inset-0 bg-red-900/90 z-20 flex flex-col items-center justify-center p-4 text-left overflow-y-auto">
                    <h3 class="text-white font-bold mb-2">生成失敗</h3>
                    <p id="errorText" class="text-xs text-red-200 break-words w-full"></p>
                </div>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('generateBtn').addEventListener('click', async () => {
            const apiKey = document.getElementById('apiKeyInput').value.trim();
            const legend = document.getElementById('legendSelect').value;
            const weapon = document.getElementById('weaponSelect').value;
            const map = document.getElementById('mapSelect').value;
            
            const btn = document.getElementById('generateBtn');
            const loader = document.getElementById('loader');
            const placeholder = document.getElementById('placeholderText');
            const imageArea = document.getElementById('imageArea');
            const errorPanel = document.getElementById('errorPanel');
            const errorText = document.getElementById('errorText');

            if (!apiKey) {
                alert("APIキーを入力してください。");
                return;
            }

            // UIの初期化
            btn.disabled = true;
            loader.classList.remove('hidden');
            imageArea.style.backgroundImage = 'none';
            placeholder.classList.remove('hidden');
            errorPanel.classList.add('hidden');

            // セーフティに引っかかりにくいプロンプト構成
            const prompt = `A stylized, high-quality concept art illustration for a sci-fi character profile. Character: ${legend}. Action: ${weapon}. Environment: ${map}. Mood: Epic, highly detailed, dramatic lighting, cyberpunk aesthetic. No text, no letters.`;

            const url = `https://generativelanguage.googleapis.com/v1beta/models/imagen-4.0-generate-001:predict?key=${apiKey}`;
            const payload = {
                instances: { prompt: prompt },
                parameters: { sampleCount: 1 }
            };

            let retries = 3; // リトライ回数を減らして早く結果を返す
            let delay = 1000;
            let base64Image = null;
            let lastErrorMessage = "";

            while (retries > 0) {
                try {
                    const response = await fetch(url, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(payload)
                    });

                    if (response.ok) {
                        const result = await response.json();
                        if (result.predictions && result.predictions[0]) {
                            base64Image = result.predictions[0].bytesBase64Encoded;
                            break; 
                        } else {
                            throw new Error("APIから画像データが返却されませんでした。");
                        }
                    } else {
                        // 【重要】APIからの詳細なエラーメッセージを読み取る
                        let errorDetail = "";
                        try {
                            const errorJson = await response.json();
                            // Google API標準のエラーフォーマットからメッセージを抽出
                            if (errorJson.error && errorJson.error.message) {
                                errorDetail = errorJson.error.message;
                            } else {
                                errorDetail = JSON.stringify(errorJson);
                            }
                        } catch (e) {
                            errorDetail = await response.text(); // JSONでなければテキストとして取得
                        }

                        const status = response.status;
                        if (status === 400) throw new Error(`[400 不正なリクエスト]\n詳細: ${errorDetail}\n※プロンプトがポリシー違反（暴力、NGワード等）になっている可能性があります。`);
                        if (status === 403) throw new Error(`[403 権限エラー]\n詳細: ${errorDetail}\n※APIキーの権限を確認してください。`);
                        if (status === 429) throw new Error(`[429 リクエスト制限]\nしばらく待ってから再度お試しください。`);
                        
                        throw new Error(`[APIエラー ${status}]\n詳細: ${errorDetail}`);
                    }
                } catch (error) {
                    lastErrorMessage = error.message;
                    
                    // 400系のエラーはリトライしても基本通らないため、ループを抜ける
                    if (error.message.includes('[400') || error.message.includes('[403')) {
                        retries = 0; 
                        break;
                    }

                    if (error.name === 'TypeError' && error.message.includes('fetch')) {
                        lastErrorMessage = "ネットワーク通信エラーが発生しました。";
                    }
                }
                
                retries--;
                if (retries > 0) {
                    await new Promise(r => setTimeout(r, delay));
                    delay *= 2; 
                }
            }

            // 終了処理
            btn.disabled = false;
            loader.classList.add('hidden');

            if (base64Image) {
                placeholder.classList.add('hidden');
                imageArea.style.backgroundImage = `url(data:image/png;base64,${base64Image})`;
            } else {
                // 詳細なエラーを赤いパネルで表示
                placeholder.classList.add('hidden');
                errorPanel.classList.remove('hidden');
                errorText.innerText = lastErrorMessage || "原因不明のエラーが発生しました。";
                console.error("生成エラー詳細:", lastErrorMessage);
            }
        });
    </script>
</body>
</html>
